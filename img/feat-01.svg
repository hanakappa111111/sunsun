<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Building body -->
  <rect x="10" y="24" width="28" height="20" rx="3" fill="#ec6d45"/>
  <!-- Roof -->
  <polygon points="24,10 8,26 40,26" fill="#c94e2b"/>
  <!-- Door -->
  <rect x="19" y="32" width="10" height="12" rx="2" fill="#fff7f4"/>
  <!-- Windows -->
  <rect x="12" y="28" width="6" height="5" rx="1.5" fill="#fff7f4" opacity=".8"/>
  <rect x="30" y="28" width="6" height="5" rx="1.5" fill="#fff7f4" opacity=".8"/>
  <!-- Clock face -->
  <circle cx="38" cy="16" r="8" fill="#fff" stroke="#ec6d45" stroke-width="1.8"/>
  <circle cx="38" cy="16" r="1.2" fill="#ec6d45"/>
  <!-- Clock hands -->
  <line x1="38" y1="16" x2="38" y2="11" stroke="#ec6d45" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="38" y1="16" x2="42" y2="16" stroke="#ec6d45" stroke-width="1.6" stroke-linecap="round"/>
  <!-- 12 dot -->
  <circle cx="38" cy="10" r=".8" fill="#ec6d45"/>
  <!-- Stars / sparkles -->
  <circle cx="12" cy="14" r="2"   fill="#ffd966"/>
  <circle cx="8"  cy="20" r="1.2" fill="#ffd966"/>
  <circle cx="16" cy="9"  r="1.4" fill="#ffd966"/>
</svg>
