<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Building body -->
  <rect x="7" y="20" width="26" height="17" rx="2" fill="#ec6d45" opacity=".85"/>
  <!-- Roof -->
  <polygon points="20,6 5,22 35,22" fill="#ec6d45"/>
  <!-- Door -->
  <rect x="16" y="27" width="8" height="10" rx="1.5" fill="#fff7f4"/>
  <!-- Left window -->
  <rect x="9"  cy="24" x="9" y="24" width="5" height="4" rx="1" fill="#fff7f4" opacity=".8"/>
  <!-- Right window -->
  <rect x="26" y="24" width="5" height="4" rx="1" fill="#fff7f4" opacity=".8"/>
  <!-- Chimney -->
  <rect x="25" y="12" width="4" height="7" rx="1" fill="#c94e2b"/>
  <!-- Smoke -->
  <circle cx="27" cy="10" r="2" fill="#f5c4b2" opacity=".55"/>
  <circle cx="30" cy="8"  r="1.5" fill="#f5c4b2" opacity=".4"/>
</svg>
